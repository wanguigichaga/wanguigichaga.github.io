<!DOCTYPE html>
<head>
    <html lang="en">

<head>
  <meta charset="utf-8">
  <meta content="width=device-width, initial-scale=1.0" name="viewport">
  
  <title>Registration page</title>
  <!--Icons font awesome-->
  <link rel="stylesheet" href="path/to/font-awesome/css/font-awesome.min.css">
  <!--CSS file-->
  <link href="assets\styles.css" rel="stylesheet">
  <!--Google fonts-->
  <link href="https://fonts.googleapis.com/css?family=Poppins" rel="stylesheet">
 </head>
 <body>
    <div class="container">
        <div class = "form"> 
            <header><img src="paw_print.png" alt="" class="img-fluid">Sign Up</header>
            <form action="" method="post">
                <div class="field input">
                    <label for="username">Username: </label>
                    <input type="text" name="username" id="username" autocomplete="off" required>
                </div>
                <div class="field input">
                    <label for="DoB">Date of Birth: </label>
                    <input type="date" name="DoB" id="DoB" autocomplete="off" required>
                </div>
                <div class="field input">
                    <label for="email">Email Address: </label>
                    <input type="text" name="email" id="email" autocomplete="off" required>
                </div>
                <div class="field input">
                    <label for="password">Password: </label>
                    <input type="text" name="password" id="password" autocomplete="off" required>
                </div>
                <div class="field input">
                    <label for="confirmpassword">Confirm password: </label>
                    <input type="text" name="confirmpassword" id="confirmpassword" autocomplete="off" required>
                </div>
                <div class="field">
                    <input type="button" class="btn" name="submit" value="Login">
                </div>
                <div class="links">
                    Already a member? <a href="login.html">Login now.</a>
                </div>

            </form>

        </div>

    </div>
    
 </body>

</html>
