<!DOCTYPE html>
<head>
    <html lang="en">

<head>
  <meta charset="utf-8">
  <meta content="width=device-width, initial-scale=1.0" name="viewport">
  <!--Favicon icons-->
  <link rel="apple-touch-icon" sizes="180x180" href="assets\apple-touch-icon.png">
  <link rel="icon" type="image/png" sizes="32x32" href="assets\favicon-32x32.png">
  <link rel="icon" type="image/png" sizes="16x16" href="assets\favicon-16x16.png">
  <link rel="manifest" href="assets\site.webmanifest">
  <title>Login</title>
  <!--Icons font awesome-->
  <link rel="stylesheet" href="path/to/font-awesome/css/font-awesome.min.css">
  <!--CSS file-->
  <link href="assets\styles.css" rel="stylesheet">
  <!--Google fonts-->
  <link href="https://fonts.googleapis.com/css?family=Poppins" rel="stylesheet">
 </head>
 <body>
    <div class="container">
        <div class = "form"> 
            <header><img src="paw_print.png" alt="" class="img-fluid">Log in</header>
            <form action="" method="post">
                <div class="field input">
                    <label for="username">Username: </label>
                    <input type="text" name="username" id="username" required>
                </div>
                <div class="field input">
                    <label for="password">Password: </label>
                    <input type="text" name="password" id="password" required>
                </div>
                <div class="field input">
                    <label for="confirmpassword">Confirm password: </label>
                    <input type="text" name="confirmpassword" id="confirmpassword" required>
                </div>
                <div class="field">
                    <input type="button" class="btn" name="submit" value="Login">
                </div>
                <div class="links">
                    Don't have an account? <a href="register.html">Sign up now.</a>
                </div>

            </form>

        </div>

    </div>
    
 </body>

</html>
